name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Bu sayede GitHub üzerinden butona basıp manuel build alabilirsiniz

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Stabil Flutter Sürümü
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: liba-partner-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
